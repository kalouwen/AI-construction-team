# .github/labeler.yml
# Auto-label PRs based on which files they touch
# Used by auto-label.yml workflow
# Installed by AI for better

# Customize these patterns to match your project structure

tests:
  - "**/*.test.*"
  - "**/*.spec.*"
  - "**/tests/**"
  - "**/__tests__/**"

docs:
  - "**/*.md"
  - "docs/**"

ci:
  - ".github/**"
  - ".claude/**"
  - "*.config.*"
  - ".shellcheckrc"
  - ".editorconfig"
  - ".gitattributes"

dependencies:
  - "package.json"
  - "package-lock.json"
  - "requirements.txt"
  - "go.mod"
  - "go.sum"
