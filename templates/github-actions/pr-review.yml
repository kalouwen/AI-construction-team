# Claude Code 自动 PR 审查
# 触发：PR 创建或更新时自动运行
#
# V1 简化版：基础审查 + 评论
# 迭代方向：
#   V2: 按文件类型分配不同 reviewer agent
#   V3: 与 JIRA/Linear 联动，自动更新 ticket 状态

name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed
        run: |
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | head -50)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review the following PR changes. Focus on:
            1. Security risks (highest priority)
            2. Logic correctness
            3. Performance issues
            4. Code maintainability

            Changed files:
            ${{ steps.changed.outputs.files }}

            Output as a PR comment with severity labels.
