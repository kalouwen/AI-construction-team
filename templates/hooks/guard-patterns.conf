# guard-patterns.conf — 集中管理所有检测模式
# 格式：每个区块以 [区块名] 开头，每行一个模式（支持 # 注释和空行）
# 新增模式只改这里，不碰脚本

# ============================================================
# Hook Profile — 控制 hooks 执行档位
# 可选值：minimal | standard | strict
# minimal  = 只跑危险命令拦截，其余跳过
# standard = 全部 hook 正常执行（默认）
# strict   = 全部 hook + 更严格检测（TODO/FIXME 视为 CRITICAL）
# ============================================================
[profile]
active=standard

# ============================================================
# Profile 映射 — 定义每个 hook 在哪些 profile 下执行
# 格式：hook脚本名=profile1,profile2,...
# ============================================================
[profile-map]
pre-bash-guard=minimal,standard,strict
post-edit-verify=standard,strict
stop-format=standard,strict
pre-compact-inject=standard,strict
session-start=minimal,standard,strict
pre-edit-guard=standard,strict
anti-rationalization=standard,strict
instinct-extract=standard,strict
session-save=standard,strict
evolution-score=standard,strict

# ============================================================
# git add 时检测的敏感文件名关键词（大小写不敏感匹配）
# ============================================================
[sensitive-files]
.env
credentials
secret
.pem
.key
.p12
.pfx

# ============================================================
# staged 内容中的密钥模式（正则，用于 grep -E）
# ============================================================
[secret-patterns]
(PRIVATE|SECRET|ACCESS)[\s_-]?KEY\s*[:=]
(api|auth)[\s_-]?(key|token|secret)\s*[:=]
-----BEGIN\s+(RSA|DSA|EC|OPENSSH)\s+PRIVATE\s+KEY-----
password\s*[:=]\s*['\"][^'\"]{8,}

# ============================================================
# 危险命令模式（正则，用于 grep -E）
# ============================================================
[dangerous-commands]
rm\s+-rf\s+/
rm\s+-rf\s+\*
mkfs
dd\s+if=

# ============================================================
# 编辑保护路径（正则，匹配文件路径）
# ============================================================
[protected-paths]
node_modules/
\.git/
vendor/
/Gen/

# ============================================================
# 编辑模式控制 — blocklist（默认）或 allowlist
#   blocklist = 只禁止 protected-paths，其他都放行
#   allowlist = 只允许 allowed-paths，其他都阻断
# 切换方式：将 mode 改为 allowlist，并填写 allowed-paths
# ============================================================
[edit-mode]
blocklist

# ============================================================
# Allowlist 路径（仅 edit-mode=allowlist 时生效）
# 每行一个正则，匹配到的路径放行，不匹配的全部阻断
# 示例：只允许 AI 改 src/features/auth/ 和对应测试
# ============================================================
# WARNING: 切换到 allowlist 模式前必须取消注释至少一条路径！
# 空的 allowed-paths 会阻断所有编辑操作。
[allowed-paths]
# src/features/auth/
# tests/features/auth/

# ============================================================
# 编辑后自检：调试语句模式（正则，用于 grep -E）
# ============================================================
[debug-patterns]
console\.log\(
debugger;?$
print\(\s*f?['\"]debug
TODO\s*:
FIXME\s*:
HACK\s*:

# ============================================================
# commit 消息格式（正则，commit message 必须匹配）
# ============================================================
[commit-format]
^(feat|fix|docs|style|refactor|perf|test|chore|ci|build|revert)(\(.+\))?:\s+.{3,}

# ============================================================
# Anti-rationalization — AI 偷懒借口检测模式（正则）
# Stop hook 扫描 AI 回复，匹配到则输出警告
# ============================================================
[rationalization-patterns]
你可以自己
剩下的.*你
大致完成
基本上.*完成
差不多了
作为练习
留给.*读者
as an exercise
left to the reader
I'll leave
you can (finish|complete|do the rest)
the rest is (straightforward|trivial|left)
基本.*搞定
应该.*没问题了
大概.*就这样
# 推脱/甩锅
超出.*能力
建议.*手动
需要.*更多上下文
这个.*不支持
可能是环境
beyond my capabilit
user should.*manual
need more context
this.*(not supported|isn't supported)
might be.*(environment|env)
I've tried (everything|all)
I cannot (solve|fix|resolve)

# ============================================================
# Intent-skip 检测 — AI 跳过意图分解直接动手
# Stop hook 扫描 AI 回复，匹配到则警告
# ============================================================
[intent-skip-patterns]
# 模糊确定性表达（该量化不量化）
可能.*没问题
应该.*可以
大概.*行
probably.*fine
should.*work
# 跳过确认直接执行的信号词
我直接.*改
我先.*写好
已经.*改完
I've already.*changed
I went ahead and

# ============================================================
# Autoloop-noquestion — 自动循环模式下禁止向用户提问
# Stop hook 扫描 AI 回复，匹配到则自动纠正（不 block 用户）
# 仅在自动循环会话中激活
# ============================================================
[autoloop-noquestion-patterns]
# 中文提问
是否继续
要我继续
需要.*确认
请.*确认
你觉得
你怎么看
你希望
你想要
接下来.*做什么
要不要
需要你
请问
可以吗
好吗[？?]
# 英文提问
shall I
should I
do you want
would you like
want me to
can I proceed
let me know
what do you think
what would you prefer
please confirm
need your (input|approval|confirmation|decision)
would you prefer
# 通用等待用户模式
等待.*指示
等待.*回复
请.*选择
请.*决定

# ============================================================
# Autoloop-antistop — 自动循环模式下禁止停机
# Stop hook 扫描 AI 回复，匹配到则自动纠正
# 仅在自动循环会话中激活
# ============================================================
[autoloop-antistop-patterns]
# 中文停机信号
已完成.*所有
全部.*完成
以上是.*总结
以上是.*摘要
到此为止
暂时告一段落
先到这里
阶段性.*完成
本轮.*结束
# 英文停机信号
I've completed
all .* done
here's (a |the )?summary
that concludes
this completes
wrapping up
stopping here
pausing here
round .* complete\.$
round .* finished
# 没有下一步动作的结束语
let me know (if|when|what)
如果.*需要
如果.*告诉
happy to (help|continue|assist)
随时.*联系
